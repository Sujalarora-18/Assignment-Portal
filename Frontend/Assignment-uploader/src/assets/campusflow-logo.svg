<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="450" height="120">
  <!-- Purple gradient rounded square background -->
  <defs>
    <linearGradient id="logobg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="100" height="100" rx="18" fill="url(#logobg)" />
  
  <!-- CF monogram in the icon -->
  <text x="60" y="78" font-size="50" font-weight="900" font-family="Arial, sans-serif" fill="white" text-anchor="middle" letter-spacing="-2">CF</text>
  
  <!-- CampusFlow text — light for dark backgrounds -->
  <text x="130" y="75" font-size="48" font-weight="bold" font-family="Arial, sans-serif">
    <tspan fill="#e2e8f0">Campus</tspan><tspan fill="#60a5fa">Flow</tspan>
  </text>
</svg>