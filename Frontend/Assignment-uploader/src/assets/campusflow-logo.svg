<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="450" height="120">
  <!-- Blue rounded square background -->
  <rect x="10" y="10" width="100" height="100" rx="18" fill="#2563eb" />
  
  <!-- White arrow icon -->
  <g transform="translate(35, 35)">
    <!-- Arrow shaft -->
    <line x1="10" y1="25" x2="40" y2="25" stroke="white" stroke-width="4" stroke-linecap="round" />
    <!-- Arrow head -->
    <polyline points="40,25 35,20 40,25 35,30" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
  
  <!-- CampusFlow text -->
  <text x="130" y="75" font-size="48" font-weight="bold" font-family="Arial, sans-serif">
    <tspan fill="#1f2937">Campus</tspan><tspan fill="#2563eb">Flow</tspan>
  </text>
</svg>